# BeakMeshWall Central Server -- Nginx reverse proxy configuration
#
# This config provides:
#   - HTTPS termination on port 443
#   - mTLS for agent API endpoints (/api/v1/agent/*)
#   - Standard HTTPS for web UI
#   - Security headers
#
# Copy this file to /etc/nginx/sites-available/beakmeshwall.conf
# and adjust paths/server_name to match your environment.

upstream beakmeshwall_backend {
    server 127.0.0.1:5000;
}

# Redirect HTTP to HTTPS
server {
    listen 80;
    server_name _;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name _;

    # -- TLS server certificate --
    ssl_certificate     /etc/nginx/ssl/beakmeshwall.crt;
    ssl_certificate_key /etc/nginx/ssl/beakmeshwall.key;

    # -- TLS settings --
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5:!RC4;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # -- Client certificate (mTLS) --
    # The CA that signed agent certificates
    ssl_client_certificate /etc/beakmeshwall/ca.crt;
    # "optional" allows both mTLS and non-mTLS requests;
    # agent endpoints enforce verification at the location level.
    ssl_verify_client optional;

    # -- Security headers --
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline';" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # -- Agent API endpoints (mTLS required) --
    location /api/v1/agent/ {
        # Reject requests without a valid client certificate
        if ($ssl_client_verify != SUCCESS) {
            return 403;
        }

        # Pass the client certificate DN to Flask for identification
        proxy_set_header X-Client-Cert-DN $ssl_client_s_dn;
        proxy_set_header X-Client-Cert-Verify $ssl_client_verify;

        proxy_pass http://beakmeshwall_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 10s;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
    }

    # -- Web UI and management API (no mTLS required) --
    location / {
        proxy_pass http://beakmeshwall_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 10s;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # -- Static assets --
    location /static/ {
        alias /opt/beakmeshwall/central/app/static/;
        expires 1d;
        access_log off;
    }

    # -- Deny access to hidden files --
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    access_log /var/log/nginx/beakmeshwall_access.log;
    error_log  /var/log/nginx/beakmeshwall_error.log;
}
