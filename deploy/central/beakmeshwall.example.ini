# BeakMeshWall Central Server Configuration
# Copy to config.ini and adjust values.
# Alternatively, use environment variables (BMW_SECRET_KEY, DB_PASSWORD, etc.)
#
# SECURITY: Never commit config.ini to version control.
#           Use this file as a reference only.

[server]
host = 0.0.0.0
port = 5000
# secret_key: set via BMW_SECRET_KEY environment variable
# debug: set to true only in development (default: false)
debug = false

[database]
host = localhost
port = 5432
name = beakmeshwall
user = beakmeshwall
# password: set via DB_PASSWORD environment variable

[tls]
# CA certificate for verifying agent client certs
ca_cert = /etc/beakmeshwall/ca.crt
# Server certificate and key (if not terminated at Nginx)
# server_cert = /etc/beakmeshwall/server.crt
# server_key = /etc/beakmeshwall/server.key

[agent]
# How often agents should poll for pending commands (seconds)
poll_interval = 30
# Mark agent as offline if no heartbeat within this period (seconds)
heartbeat_timeout = 90

[logging]
# Logging level: DEBUG, INFO, WARNING, ERROR, CRITICAL
level = INFO
