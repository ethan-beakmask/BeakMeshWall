# BeakMeshWall Agent Configuration
# Copy to /etc/beakmeshwall/agent.yaml and adjust values.
#
# SECURITY: This file may contain the agent secret after registration.
#           Restrict permissions: chmod 600 /etc/beakmeshwall/agent.yaml

central:
  # URL of the BeakMeshWall Central Server
  url: "https://your-central-server:5000"

agent:
  # Agent ID and secret are auto-filled after registration.
  # Do not set these manually unless restoring from backup.
  id: ""
  secret: ""
  # How often to poll the Central Server for pending commands (seconds)
  poll_interval: 30

tls:
  # CA certificate that signed the Central Server's TLS certificate
  ca_cert: ""        # e.g., /etc/beakmeshwall/ca.crt
  # Agent client certificate and key for mTLS authentication
  client_cert: ""    # e.g., /etc/beakmeshwall/agent.crt
  client_key: ""     # e.g., /etc/beakmeshwall/agent.key
  # Skip TLS verification (development only -- never use in production)
  skip_verify: false

logging:
  # Log level: debug, info, warn, error
  level: "info"
  # Log output: empty string = stdout, or a file path
  file: ""           # e.g., /var/log/beakmeshwall-agent.log
