{% extends "base.html" %}
{% block title %}Tables - BeakMeshWall{% endblock %}

{% block content %}
<div x-data="tablesPage()" x-init="startAutoRefresh()">

    <h4 class="mb-4">nftables Table Observation</h4>

    <!-- Node Selector -->
    <div class="row mb-3">
        <div class="col-md-4">
            <label class="form-label">Select Node</label>
            <select class="form-select bg-dark text-light border-secondary"
                    x-model="selectedNodeId"
                    @change="fetchTables()">
                <option value="">-- Select a node --</option>
                <template x-for="n in nodes" :key="n.id">
                    <option :value="n.id" x-text="n.hostname + ' (' + (n.ip_address || 'N/A') + ')'"></option>
                </template>
            </select>
        </div>
    </div>

    <!-- Tables Display -->
    <template x-if="selectedNodeId">
        <div>
            <div class="table-responsive">
                <table class="table table-dark table-striped table-hover align-middle">
                    <thead>
                        <tr>
                            <th role="button" @click="sortBy('name')" style="cursor: pointer;">
                                Table Name
                                <span x-show="sortKey === 'name' && sortAsc" class="ms-1">&#9650;</span>
                                <span x-show="sortKey === 'name' && !sortAsc" class="ms-1">&#9660;</span>
                                <span x-show="sortKey !== 'name'" class="ms-1 text-secondary">&#9650;&#9660;</span>
                            </th>
                            <th role="button" @click="sortBy('family')" style="cursor: pointer;">
                                Family
                                <span x-show="sortKey === 'family' && sortAsc" class="ms-1">&#9650;</span>
                                <span x-show="sortKey === 'family' && !sortAsc" class="ms-1">&#9660;</span>
                                <span x-show="sortKey !== 'family'" class="ms-1 text-secondary">&#9650;&#9660;</span>
                            </th>
                            <th>Managed</th>
                            <th role="button" @click="sortBy('external')" style="cursor: pointer;">
                                External Source
                                <span x-show="sortKey === 'external' && sortAsc" class="ms-1">&#9650;</span>
                                <span x-show="sortKey === 'external' && !sortAsc" class="ms-1">&#9660;</span>
                                <span x-show="sortKey !== 'external'" class="ms-1 text-secondary">&#9650;&#9660;</span>
                            </th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <template x-for="tbl in sortedTables" :key="tbl.name + '-' + tbl.family">
                            <tr :class="tbl.managed ? 'table-success bg-opacity-10' : ''">
                                <td x-text="tbl.name"></td>
                                <td x-text="tbl.family"></td>
                                <td>
                                    <span class="badge"
                                          :class="tbl.managed ? 'bg-success' : 'bg-secondary'"
                                          x-text="tbl.managed ? 'Yes' : 'No'"></span>
                                </td>
                                <td>
                                    <template x-if="!tbl.managed && tbl.external">
                                        <span class="badge"
                                              :class="sourceBadge(tbl.external)"
                                              x-text="tbl.external"></span>
                                    </template>
                                    <template x-if="tbl.managed || !tbl.external">
                                        <span class="text-secondary">--</span>
                                    </template>
                                </td>
                                <td>
                                    <template x-if="tbl.managed">
                                        <span class="text-secondary small">Owner</span>
                                    </template>
                                    <template x-if="!tbl.managed">
                                        <span class="text-secondary small">Read-only</span>
                                    </template>
                                </td>
                            </tr>
                        </template>
                        <template x-if="tables.length === 0 && !loading">
                            <tr>
                                <td colspan="5" class="text-center text-secondary py-4">
                                    No tables reported by this node.
                                </td>
                            </tr>
                        </template>
                        <template x-if="loading">
                            <tr>
                                <td colspan="5" class="text-center py-4">
                                    <span class="spinner-border spinner-border-sm me-1"></span>
                                    Loading tables...
                                </td>
                            </tr>
                        </template>
                    </tbody>
                </table>
            </div>

            <p class="text-secondary" style="font-size: 0.85rem;">
                <span x-text="tables.length"></span> table(s) on this node.
                <template x-if="lastReported">
                    Last reported: <span x-text="lastReported"></span>.
                </template>
                Auto-refresh every 30s. Last updated: <span x-text="lastUpdated">--</span>
            </p>
        </div>
    </template>

    <template x-if="!selectedNodeId">
        <div class="text-center text-secondary py-5">
            Select a node above to view its nftables tables.
        </div>
    </template>

</div>
{% endblock %}

{% block extra_scripts %}
<script>
function tablesPage() {
    return {
        nodes: {{ nodes | tojson }},
        tables: [],
        selectedNodeId: '',
        sortKey: 'name',
        sortAsc: true,
        lastUpdated: '--',
        lastReported: '',
        loading: false,
        intervalId: null,

        get sortedTables() {
            let key = this.sortKey;
            let asc = this.sortAsc;
            return [...this.tables].sort((a, b) => {
                let va = a[key] ?? '';
                let vb = b[key] ?? '';
                if (typeof va === 'string') {
                    va = va.toLowerCase();
                    vb = vb.toLowerCase();
                }
                if (va < vb) return asc ? -1 : 1;
                if (va > vb) return asc ? 1 : -1;
                return 0;
            });
        },

        sortBy(key) {
            if (this.sortKey === key) {
                this.sortAsc = !this.sortAsc;
            } else {
                this.sortKey = key;
                this.sortAsc = true;
            }
        },

        sourceBadge(source) {
            const map = {
                'docker': 'bg-primary',
                'lxc': 'bg-purple',
                'podman': 'bg-info'
            };
            return map[source?.toLowerCase()] || 'bg-secondary';
        },

        fetchTables() {
            if (!this.selectedNodeId) {
                this.tables = [];
                this.lastReported = '';
                return;
            }
            this.loading = true;
            fetch('/api/v1/nodes/' + this.selectedNodeId + '/tables', { credentials: 'same-origin' })
            .then(r => {
                if (!r.ok) throw new Error('Failed to fetch tables');
                return r.json();
            })
            .then(data => {
                this.tables = data.tables || [];
                this.lastReported = data.last_report_at ? new Date(data.last_report_at).toLocaleString() : '';
                this.lastUpdated = new Date().toLocaleTimeString();
            })
            .catch(() => {
                this.tables = [];
            })
            .finally(() => {
                this.loading = false;
            });
        },

        startAutoRefresh() {
            this.lastUpdated = new Date().toLocaleTimeString();
            this.intervalId = setInterval(() => {
                if (this.selectedNodeId) {
                    this.fetchTables();
                }
            }, 30000);
        }
    };
}
</script>

<style>
    .bg-purple {
        background-color: #7952b3 !important;
    }
    tr.table-success.bg-opacity-10 {
        --bs-table-bg: rgba(25, 135, 84, 0.1);
    }
</style>
{% endblock %}
